<!DOCTYPE html>
<html lang="zh-Hant-TW">
    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex 練習版圖</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/20260302.css">
    <style>
        body {
            text-align: center;
            background-color: var(--sky-blue07b);
            font-family: "微軟正黑體";
        }
        .box01 {
            font-size: 40px;
            font-weight: 900;
            margin-top: 20px;
            border-radius: 10px;
            padding: 15px;
        }
        .box02 {
            font-size: 30px;
            font-weight: 900;
            margin-top: 15px;
            border-radius: 10px;
            padding: 20px 0;
        }
        .box03 {
            height: 200px;
            margin-top: 15px;
            border-radius: 10px;
            
            /* 文字 */
            /* text-align: center; */
            line-height: 200px;
            font-size: 25px;
            font-weight: 900;

            /* 圖片 */
            background-position: center center;
            background-size: cover;
        }
        .box04 {
            font-size: 30px;
            font-weight: 900;
            margin-top: 15px;
            border-radius: 10px;
            padding: 30px 0;
        }
        .box05 {
            font-size: 30px;
            font-weight: 900;
            margin-top: 15px;
            border-radius: 10px;
            padding: 30px 0;
        }
        .box06 {
            font-size: 30px;
            font-weight: 900;
            margin-top: 15px;
            border-radius: 10px;
            padding: 30px 0;
        }
        .box07 {
            font-size: 24px;
            font-weight: 900;
            margin: 15px 0;
            border-radius: 10px;
            padding: 20px 0;
        }
    </style>
</head>
    
<body>
    <div class="container">
        <div class="row">
            <div class="col-md-10 offset-md-1">
                <div class="box01 bg-primary text-light">旅行主題介紹頁</div>
            </div>
        </div>
        <div class="row justify-content-md-between">
            <div class="col-md-3">
                <div class="box02 bg-success text-light">自然景色</div>
            </div>
            <div class="col-md-3">
                <div class="box02 bg-warning">在地美食</div>
            </div>
            <div class="col-md-3">
                <div class="box02 bg-danger text-light">文化體驗</div>
            </div>
        </div>
        <div class="row">
            <div class="col-md-6">
                <div class="box03 bg-light" style="background-image: url(img/TaiwanNature_004.avif);"></div>
            </div>
            <div class="col-md-6">
                <div class="box03 bg-light">山林步道與放鬆空間</div>
            </div>
            <!-- <div class="col-md-6 order-3 order-md-2">
                <div class="box03 bg-info">湖畔風景與悠閒下午</div>
            </div>
            <div class="col-md-6 order-2 order-md-3">
                <div class="box03 bg-info" style="background-image: url(img/TaiwanNature_003.avif);"></div>
            </div> -->
        </div>

        <div class="row flex-row-reverse">
            <div class="col-md-6">
                <div class="box03 bg-info" style="background-image: url(img/TaiwanNature_003.avif);"></div>
            </div>
            <div class="col-md-6">
                <div class="box03 bg-info">湖畔風景與悠閒下午</div>
            </div>
        </div>

        <div class="row flex-column">
            <div class="col-md-4">
                <div class="box04 bg-secondary text-light">景點A</div>
            </div>
            <div class="col-md-4 align-self-center">
                <div class="box04 bg-secondary text-light">景點B</div>
            </div>
            <div class="col-md-4 align-self-end">
                <div class="box04 bg-secondary text-light">景點C</div>
            </div>
        </div>
        <div class="row">
            <div class="col-6 col-md-3 order-md-3">
                <div class="box05 bg-primary text-light">01</div>
            </div>
            <div class="col-6 col-md-3 order-md-2">
                <div class="box05 bg-warning">02</div>
            </div>
            <div class="col-6 col-md-3 order-md-1">
                <div class="box05 bg-danger text-light">03</div>
            </div>
            <div class="col-6 col-md-3 order-md-0">
                <div class="box05 bg-success">04</div>
            </div>
        </div>
        <div class="row">
            <div class="col-md-3">
                <div class="box06 bg-dark text-light">左</div>
            </div>
            <div class="col-md-3 offset-md-6">
                <div class="box06 bg-dark text-light">右</div>
            </div>
        </div>
        <div class="row justify-content-center">
            <div class="d-none d-xl-block col-xl-10">
                <div class="box07 bg-warning">這一塊只有 XL 以上才顯示</div>
            </div>
        </div>
    </div>
    <script src="js/bootstrap.bundle.min.js"></script>
</body>
    
</html>
